<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#16323e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff9c"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
  </defs>

  <rect width="800" height="320" fill="url(#bg)"/>

  <!-- orbit path guide (faint) -->
  <ellipse cx="400" cy="160" rx="260" ry="90" fill="none" stroke="#00ff9c" stroke-opacity="0.15" stroke-width="1"/>

  <!-- center label -->
  <text x="400" y="150" text-anchor="middle" font-family="Fira Code, monospace" font-size="34" font-weight="700" fill="#ffffff">TARUN R</text>
  <text x="400" y="180" text-anchor="middle" font-family="Fira Code, monospace" font-size="15" fill="#00ff9c">AI/ML Engineer · Automation &amp; Agentic Systems</text>

  <!-- orbiting group -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 400 160" to="360 400 160" dur="14s" repeatCount="indefinite"/>

    <g id="icon0" transform="translate(660,160)">
      <animateTransform attributeName="transform" type="rotate" from="0 660 160" to="-360 660 160" dur="14s" repeatCount="indefinite" additive="sum"/>
      <circle r="30" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
      <text text-anchor="middle" dy="7" font-family="Fira Code, monospace" font-size="14" fill="#00ff9c">PY</text>
    </g>

    <g transform="rotate(60 400 160)">
      <g transform="translate(660,160)">
        <animateTransform attributeName="transform" type="rotate" from="-60 660 160" to="-420 660 160" dur="14s" repeatCount="indefinite" additive="sum"/>
        <circle r="30" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
        <text text-anchor="middle" dy="7" font-family="Fira Code, monospace" font-size="12" fill="#00ff9c">TORCH</text>
      </g>
    </g>

    <g transform="rotate(120 400 160)">
      <g transform="translate(660,160)">
        <animateTransform attributeName="transform" type="rotate" from="-120 660 160" to="-480 660 160" dur="14s" repeatCount="indefinite" additive="sum"/>
        <circle r="30" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
        <text text-anchor="middle" dy="7" font-family="Fira Code, monospace" font-size="11" fill="#00ff9c">LANGCH</text>
      </g>
    </g>

    <g transform="rotate(180 400 160)">
      <g transform="translate(660,160)">
        <animateTransform attributeName="transform" type="rotate" from="-180 660 160" to="-540 660 160" dur="14s" repeatCount="indefinite" additive="sum"/>
        <circle r="30" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
        <text text-anchor="middle" dy="7" font-family="Fira Code, monospace" font-size="12" fill="#00ff9c">DOCKER</text>
      </g>
    </g>

    <g transform="rotate(240 400 160)">
      <g transform="translate(660,160)">
        <animateTransform attributeName="transform" type="rotate" from="-240 660 160" to="-600 660 160" dur="14s" repeatCount="indefinite" additive="sum"/>
        <circle r="30" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
        <text text-anchor="middle" dy="7" font-family="Fira Code, monospace" font-size="14" fill="#00ff9c">REACT</text>
      </g>
    </g>

    <g transform="rotate(300 400 160)">
      <g transform="translate(660,160)">
        <animateTransform attributeName="transform" type="rotate" from="-300 660 160" to="-660 660 160" dur="14s" repeatCount="indefinite" additive="sum"/>
        <circle r="30" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
        <text text-anchor="middle" dy="7" font-family="Fira Code, monospace" font-size="11" fill="#00ff9c">FASTAPI</text>
      </g>
    </g>
  </g>
</svg>
